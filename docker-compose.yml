version: '3.8'

services:
  sentiment-app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: sentiment_slang_analyzer
    ports:
      - "8000:8000"
    environment:
      - CUDA_VISIBLE_DEVICES=-1
      - TF_CPP_MIN_LOG_LEVEL=2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sentiment-network

networks:
  sentiment-network:
    driver: bridge
